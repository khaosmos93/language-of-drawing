name: Deploy web UI to GitHub Pages

on:
  push:
    branches: ["main", "claude/image-math-transform-AGsqz"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r web/* _site/
          # Pyodide fetches the same Python source the CLI uses.
          mkdir -p _site/core
          cp -r core/* _site/core/
          # Touch a no-jekyll marker so underscored paths (if any) are served.
          touch _site/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
